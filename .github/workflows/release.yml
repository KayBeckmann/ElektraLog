name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-web:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
      - run: flutter pub get
        working-directory: app
      - run: flutter build web --release --no-tree-shake-icons
        working-directory: app
      - uses: actions/upload-artifact@v4
        with:
          name: flutter-web-${{ github.ref_name }}
          path: app/build/web/

  build-android:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
      - run: flutter pub get
        working-directory: app
      - run: flutter build apk --release --no-tree-shake-icons
        working-directory: app
      - uses: actions/upload-artifact@v4
        with:
          name: elektralog-${{ github.ref_name }}.apk
          path: app/build/app/outputs/flutter-apk/app-release.apk

  build-server:
    name: Build Dart Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
        working-directory: packages/elektralog_server
      - run: dart compile exe bin/main.dart -o bin/server
        working-directory: packages/elektralog_server
      - uses: actions/upload-artifact@v4
        with:
          name: elektralog-server-${{ github.ref_name }}
          path: packages/elektralog_server/bin/server
