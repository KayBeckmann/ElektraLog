server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter Web App
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Proxy -> Serverpod backend
    location /api/ {
        proxy_pass http://serverpod:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    gzip on;
    gzip_types text/plain application/javascript text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Service worker + bootstrap: never cache (must always be fresh)
    location ~* (flutter_service_worker\.js|flutter_bootstrap\.js)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # Main app entrypoint: short cache so updates propagate quickly
    location = /main.dart.js {
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;
    }

    # Hashed Flutter assets (filenames contain content hash) — safe to cache long
    location ~* /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # All other static files (icons, manifest, canvaskit)
    location ~* \.(png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg|json|wasm)$ {
        expires 1d;
        add_header Cache-Control "public";
    }
}
