name: elektralog
description: VDE-Messungen und Prüfprotokolle — ElektraLog
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Fonts
  google_fonts: ^6.2.1

  # Local Database
  sembast: ^3.7.2
  sembast_web: ^2.2.1
  path_provider: ^2.1.3
  path: ^1.9.0

  # PDF Export
  pdf: ^3.11.0
  printing: ^5.14.0

  # CSV Import
  csv: ^6.0.0
  file_picker: ^8.1.3

  # QR Codes
  qr_flutter: ^4.1.0

  # Utilities
  uuid: ^4.4.0

  # Network + Auth
  http: ^1.2.2
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
