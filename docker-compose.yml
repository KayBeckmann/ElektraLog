version: "3.9"

# =============================================================================
# ElektraLog — Docker Compose
# All configuration via .env — no hardcoded secrets or ports!
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — persistent data store
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # App — Flutter Web (served via Nginx)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT}:80"
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Serverpod — Dart backend (company profile only)
  # ---------------------------------------------------------------------------
  serverpod:
    image: busybox
    profiles: ["company"]
    command: ["sh", "-c", "echo 'Serverpod placeholder — configure in Phase 2' && sleep infinity"]
    environment:
      SERVERPOD_PORT: ${SERVERPOD_PORT}
      SERVERPOD_INSIGHTS_PORT: ${SERVERPOD_INSIGHTS_PORT}

  # ---------------------------------------------------------------------------
  # Wiki.js — internal documentation (company profile only)
  # ---------------------------------------------------------------------------
  wiki:
    image: requarks/wiki:2
    profiles: ["company"]
    environment:
      DB_TYPE: postgres
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ${WIKIJS_DB}
      SECRET_KEY: ${WIKI_SECRET}
    ports:
      - "${WIKI_PORT}:3000"
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Homepage — project landing page (company profile only)
  # ---------------------------------------------------------------------------
  homepage:
    image: nginx:alpine
    profiles: ["company"]
    volumes:
      - ./homepage/dist:/usr/share/nginx/html:ro
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Proxy — Traefik reverse proxy with Let's Encrypt (company profile only)
  # ---------------------------------------------------------------------------
  proxy:
    image: traefik:v3.0
    profiles: ["company"]
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:${PROXY_HTTP_PORT}"
      - "--entrypoints.websecure.address=:${PROXY_HTTPS_PORT}"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "${PROXY_HTTP_PORT}:${PROXY_HTTP_PORT}"
      - "${PROXY_HTTPS_PORT}:${PROXY_HTTPS_PORT}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_data:/letsencrypt
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  letsencrypt_data:
    driver: local
