version: "3.9"

# =============================================================================
# ElektraLog — Docker Compose
# All configuration via .env — no hardcoded secrets or ports!
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — persistent data store
  # NOTE: Backup via docker/postgres/backup.sh — run manually or via cron.
  #       No automatic backup in Compose; see docker/postgres/backup.sh.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./packages/elektralog_server/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql:ro
      - ./packages/elektralog_server/migrations/002_seed_permissions.sql:/docker-entrypoint-initdb.d/002_seed_permissions.sql:ro
      - ./packages/elektralog_server/migrations/003_superadmin.sql:/docker-entrypoint-initdb.d/003_superadmin.sql:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - elektralog

  # ---------------------------------------------------------------------------
  # App — Flutter Web (served via Nginx, volume-mounted build)
  # ---------------------------------------------------------------------------
  app:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./docker/app_web:/usr/share/nginx/html:ro
      - ./app/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${APP_PORT}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - elektralog

  # ---------------------------------------------------------------------------
  # Serverpod — Dart HTTP backend (always active from Phase 2)
  # ---------------------------------------------------------------------------
  serverpod:
    build:
      context: ./packages/elektralog_server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SERVERPOD_PORT: ${SERVERPOD_PORT}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "127.0.0.1:${SERVERPOD_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - elektralog

  # ---------------------------------------------------------------------------
  # Wiki.js — internal documentation (company profile only)
  # ---------------------------------------------------------------------------
  wiki:
    image: requarks/wiki:2
    profiles: ["company"]
    restart: unless-stopped
    environment:
      DB_TYPE: postgres
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ${WIKIJS_DB}
      SECRET_KEY: ${WIKI_SECRET}
    ports:
      - "${WIKI_PORT}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - elektralog

  # ---------------------------------------------------------------------------
  # Homepage — project landing page (company profile only)
  # ---------------------------------------------------------------------------
  homepage:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./homepage:/usr/share/nginx/html:ro
      - ./homepage/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${HOMEPAGE_PORT}:80"
    networks:
      - elektralog
    profiles: ["company"]

volumes:
  postgres_data:
    driver: local

networks:
  elektralog:
    driver: bridge
